<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Custom Player</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .video-container {
      position: relative;
      width: 560px;
      height: 315px;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.2s, color 0.2s;
    }

    .btn:hover {
      transform: scale(1.2);
      color: #1db954;
    }

    .progress-container {
      flex-grow: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 3px;
      cursor: pointer;
      position: relative;
    }

    .progress {
      height: 100%;
      background: #1db954;
      width: 0%;
      border-radius: 3px;
    }

    .time-display {
      color: white;
      font-size: 14px;
      min-width: 120px;
      text-align: right;
      font-family: monospace;
    }
  </style>

  <!-- Load Font Awesome (for icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>
  <div class="video-container">
    <iframe 
  id="ytplayer"
  width="560" 
  height="315"
  src="https://www.youtube-nocookie.com/embed/j5XdY5wkVTA?start=15&controls=0&enablejsapi=1&modestbranding=1&rel=0&iv_load_policy=3&fs=0"
  title="YouTube video player"
  frameborder="0"
  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
  allowfullscreen>
</iframe>


    <!-- Custom Controls -->
    <div class="controls">
      <button class="btn" onclick="playVideo()"><i class="fas fa-play"></i></button>
      <button class="btn" onclick="pauseVideo()"><i class="fas fa-pause"></i></button>
      <button class="btn" onclick="toggleMute()"><i class="fas fa-volume-mute"></i></button>
      
      <div class="progress-container" onclick="seek(event)">
        <div class="progress" id="progress-bar"></div>
      </div>

      <div class="time-display" id="time-display">0:00 / 0:00 (−0:00)</div>
    </div>
  </div>

  <script>
    let player;
    let progressInterval;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('ytplayer', {
        events: { 'onReady': onPlayerReady }
      });
    }

    function onPlayerReady() {
      // Update progress every second
      progressInterval = setInterval(updateProgress, 1000);
    }

    function playVideo() {
      player.playVideo();
    }

    function pauseVideo() {
      player.pauseVideo();
    }

    function toggleMute() {
      if (player.isMuted()) {
        player.unMute();
      } else {
        player.mute();
      }
    }

    function formatTime(seconds) {
      seconds = Math.floor(seconds);
      const min = Math.floor(seconds / 60);
      const sec = seconds % 60;
      return `${min}:${sec < 10 ? "0" + sec : sec}`;
    }

    function updateProgress() {
      if (player && player.getDuration) {
        const duration = player.getDuration();
        const current = player.getCurrentTime();
        const percent = (current / duration) * 100;
        document.getElementById('progress-bar').style.width = percent + "%";

        const timeDisplay = document.getElementById('time-display');
        const timeLeft = duration - current;
        timeDisplay.textContent = `${formatTime(current)} / ${formatTime(duration)} (−${formatTime(timeLeft)})`;
      }
    }

    function seek(event) {
      const bar = event.currentTarget;
      const clickX = event.offsetX;
      const width = bar.offsetWidth;
      const percent = clickX / width;
      const duration = player.getDuration();
      player.seekTo(duration * percent, true);
    }
  </script>
</body>
</html>
