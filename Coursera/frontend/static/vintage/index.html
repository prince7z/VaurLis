<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VaurLis: Rule With Wisdom</title>
<link rel="icon" type="image/png" href="./assets/logo_transp.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:wght@400;500&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --cream: #f8f5f0;
        --gold: #c9b037;
        --burgundy: #4b1c2f;
        --navy: #1a2238;
        --brass: #bfa76f;
        --deep: #222;
        --overlay: rgba(26, 34, 56, 0.7);
    }

    body {
        font-family: 'Lora', serif;
        line-height: 1.6;
        color: var(--deep);
        overflow-x: hidden;
    }

    /* Navigation */
    .nav {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1000;
        padding: 1rem 2rem;
        border-bottom: 1px solid rgba(201, 176, 55, 0.2);
    }

    .nav-content {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1200px;
        margin: 0 auto;
    }

    .hamburger {
        backdrop-filter: blur(10px);

        width: 24px;
        height: 24px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        justify-content: space-around;
    }

    .hamburger span {
        width: 100%;
        height: 2px;
        background: var(--navy);
        transition: 0.3s;
    }

    .logo {
         backdrop-filter: blur(10px);

        height: 40px;
    }

    .join-btn {
        backdrop-filter: blur(10px);
        color: var(--navy);
        text-decoration: none;
        font-weight: 500;
        padding: 8px 16px;
        border: 1px solid var(--gold);
        border-radius: 4px;
        transition: all 0.3s;
    }

    .join-btn:hover {
        background: var(--gold);
        color: var(--burgundy);
    }

    /* Hero Section */
    .hero {
        min-height: 100vh;
        background: linear-gradient(var(--overlay), var(--overlay)), url('./assets/Lib.jpg');
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--cream);
        position: relative;
    }

    .hero-content {
        max-width: 800px;
        padding: 2rem;
    }

    .hero-tagline {
        font-size: 0.9rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 1rem;
        color: var(--gold);
    }

    .hero h1 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(2.5rem, 8vw, 4.5rem);
        font-weight: 400;
        line-height: 1.2;
        margin-bottom: 1rem;
    }

    .hero h2 {
        font-family: 'Playfair Display', serif;
        font-size: clamp(1.8rem, 5vw, 3rem);
        font-weight: 400;
        font-style: italic;
        margin-bottom: 2rem;
        color: var(--brass);
    }

    .hero-description {
        font-size: 1.1rem;
        margin-bottom: 3rem;
        opacity: 0.9;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
    }

    .cta-button {
        display: inline-block;
        background: var(--gold);
        color: var(--burgundy);
        padding: 1rem 2rem;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s;
        border: 2px solid var(--gold);
    }

    .cta-button:hover {
        background: transparent;
        color: var(--gold);
    }

    /* Scroll Indicator */
    .scroll-indicator {
        position: absolute;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        color: var(--cream);
        cursor: pointer;
        animation: bounce 2s infinite;
    }

    @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
        40% { transform: translateX(-50%) translateY(-10px); }
        60% { transform: translateX(-50%) translateY(-5px); }
    }

    /* Book Time Section */
    .book-time {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        z-index: 999;
    }

    .book-btn {
        background: rgba(248, 245, 240, 0.95);
        color: var(--navy);
        padding: 1rem 1.5rem;
        border: none;
        border-radius: 6px;
        font-weight: 500;
        cursor: pointer;
        backdrop-filter: blur(10px);
        border: 1px solid var(--gold);
        transition: all 0.3s;
    }

    .book-btn:hover {
        background: var(--gold);
        color: var(--burgundy);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .nav {
            padding: 1rem;
        }
        
        .hero-content {
            padding: 1rem;
        }
        
        .book-time {
            bottom: 1rem;
            right: 1rem;
        }
    }
</style>
</head>

<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-content">
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            
            <img src="./assets/logo_clr.png" alt="VaurLis Logo" class="logo">
            
            <a href="#join" class="join-btn">JOIN US</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-tagline">MASTER YOUR CRAFT</div>
            
            <h1>VaurLis Academy</h1>
            <h2>Learning Center</h2>
            
            <p class="hero-description">
                We welcome those who seek more than just a course — 
                a community, a legacy, a refined escape into knowledge.
            </p>
            
            <a href="#membership" class="cta-button">Apply for Membership</a>
        </div>
        
        <div class="scroll-indicator">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 16l-6-6h12l-6 6z"/>
            </svg>
        </div>
    </section>

    <!-- Book Time Button -->
    <div class="book-time">
        <button class="book-btn">
            📚 BOOK STUDY TIME
        </button>
    </div>

</body>
</html>
